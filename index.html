<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerwin & Alisa 婚禮邀請函</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #8B1E2E;      /* 經典深紅 */
            --accent-gold: #D4AF37;      /* 香檳金 */
            --forest-green: #1E3F20;     /* 森林綠 */
            --light-bg: #FAFAF7;         /* 溫潤奶油白 */
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background-color: var(--light-bg);
            color: #333;
            line-height: 1.8;
            overflow-x: hidden;
            width: 100%;
        }

        .en-font {
            font-family: 'Cormorant Garamond', serif;
        }

        /* 導航列 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            padding: 12px 10px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--forest-green);
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: var(--primary-red);
        }

        /* 首頁封面 - 響應式背景圖片切換核心程式碼 */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 80px 20px 40px 20px;
            width: 100%;

            /* 預設背景設定 (適用於電腦版/寬螢幕) */
            background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('【在此貼上電腦版寬幅富士山婚紗照網址】');
            background-repeat: no-repeat;
            background-size: cover;    /* 圖片自動縮放以完全覆蓋背景區域 */
            background-position: center; /* 圖片置中對齊，確保人物維持在中間 */
        }

        /* 針對螢幕寬度小於 768px 的裝置 (例如手機直幅螢幕) 進行設定 */
        @media (max-width: 767px) {
            .hero {
                /* 切換成手機版直式比例婚紗照 */
                background-image: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('https://i.postimg.cc/mg0JG8fz/1T6A0400.jpg');
                
                /* 在手機版也維持 cover 和 center 設定，確保不變形且人物置中 */
                background-size: cover;
                background-position: center;
            }
        }

        /* 首頁內容文字樣式 */
        .hero h1 {
            font-size: clamp(28px, 8vw, 42px);
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 4px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero h2 {
            font-size: clamp(18px, 5vw, 24px);
            font-weight: 400;
            color: var(--accent-gold);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .hero-names {
            font-size: clamp(16px, 4.5vw, 20px);
            letter-spacing: 5px;
            margin-bottom: 40px;
            border-top: 1px solid rgba(255,255,255,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding: 10px 30px;
            max-width: 90%;
        }

        /* 以下為網頁其他區塊樣式，維持不變 */
        section {
            padding: clamp(50px, 8vw, 80px) 20px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .section-title {
            color: var(--primary-red);
            font-size: clamp(22px, 6vw, 28px);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .section-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: var(--forest-green);
            margin-bottom: 40px;
            font-style: italic;
        }

        footer {
            background-color: var(--forest-green);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 40px 20px;
            font-size: 13px;
            letter-spacing: 1px;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#about">關於我們</a></li>
            <li><a href="#details">婚禮詳情</a></li>
            <li><a href="#info">婚禮資訊</a></li>
            <li><a href="#rsvp">出席回函</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1 class="en-font">Legacy of Love</h1>
        <h2>時光中的愛</h2>
        <div class="hero-names">Kerwin & Alisa</div>
    </header>

    <section id="about">
        <h2 class="section-title">關於我們</h2>
        <div class="section-subtitle">Our Story</div>
        <p>
            在光影的流轉中，我們相遇、相知、相惜。
            這份愛，承載著過去的祝福，也開啟了未來的篇章。
            誠摯邀請您，與我們一同見證這份溫暖的傳承。
        </p>
    </section>

    <footer>
        <p>© 2026 Kerwin & Alisa. All Rights Reserved. Legacy of Love.</p>
    </footer>

</body>
</html>
